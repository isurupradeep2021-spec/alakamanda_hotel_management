<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:Arial,sans-serif;
      background:linear-gradient(135deg,#0f172a,#1e293b 40%,#f3e8cf); }
    .card { width:min(420px,92vw); padding:24px; border-radius:16px; backdrop-filter:blur(12px);
      background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.35); color:#fff; }
    .field { margin:10px 0; display:grid; gap:6px; }
    input,select,button { padding:10px; border-radius:8px; border:0; }
    button { background:#f4d28f; cursor:pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h2><i class="bi bi-door-open"></i> Login</h2>
    <div class="field"><label>Email</label><input id="email" type="email" /></div>
    <div class="field"><label>Password</label><input id="password" type="password" /></div>
    <div class="field"><label>Role</label><select id="role"></select></div>
    <button id="loginBtn"><i class="bi bi-box-arrow-in-right"></i> Login</button>
  </div>
  <script src="/js/role.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
